name: Publish to npm + MCP Registry

on:
  release:
    types: [published]

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # NOTE: do NOT set `registry-url` here. With Trusted Publishing
      # the OIDC token is the only credential we want present; setting
      # `registry-url` makes setup-node write an .npmrc that reads from
      # `NODE_AUTH_TOKEN`, which then gets populated with the runner's
      # GITHUB_TOKEN. npm publish tries to auth with that, fails, and
      # returns a misleading 404 — TP never fires.
      - uses: actions/setup-node@v6
        with:
          node-version: 20

      # Node 20 LTS ships with npm 10, which predates Trusted Publishing
      # (added in npm 11.5+). Without this upgrade, `npm publish` ignores
      # the OIDC env vars and exits with ENEEDAUTH.
      #
      # Pinned to npm@^11 (not @latest) to keep the release path
      # reproducible: npm 12 may raise its Node engine floor above
      # the runner's Node 20, which would silently break releases on
      # any branch or scheduled run without a repo-level change.
      - name: Upgrade npm to a TP-capable version
        run: npm install -g npm@^11

      - name: Verify version sync
        run: node scripts/check-versions.mjs

      - name: Install dependencies and build
        run: |
          npm ci
          npm run build

      # Install mcp-publisher BEFORE npm publish so a broken or unexpectedly
      # behaviorally-changed binary fails the workflow before the irreversible
      # npm publish. Pinned to a known-good version + SHA-256 so a breaking
      # upstream release does NOT silently become the new `latest`.
      # Bump in lockstep across all sibling repos.
      - name: Install mcp-publisher
        env:
          MCP_PUBLISHER_VERSION: v1.7.8
          MCP_PUBLISHER_SHA256: 48230dbec85bd88a0d42977ef533cddda23235f0db4331b9263ce53b432cb75c
        run: |
          curl -fsSL -o mcp-publisher.tar.gz \
            "https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/mcp-publisher_linux_amd64.tar.gz"
          echo "${MCP_PUBLISHER_SHA256}  mcp-publisher.tar.gz" | sha256sum -c -
          tar xzf mcp-publisher.tar.gz
          sudo mv mcp-publisher /usr/local/bin/
          rm mcp-publisher.tar.gz
          mcp-publisher --help >/dev/null

      # Cutover/recovery guard: skip npm publish if the version is already
      # on npm (e.g. partial prior release where mcp-publisher failed after
      # npm publish succeeded). Not a steady-state need — every fresh
      # version bump will fall through to the publish step.
      - name: Check if version already on npm
        id: npm_check
        run: |
          version=$(node -p "require('./package.json').version")
          if npm view "@lazyants/lexware-mcp-server@${version}" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Version ${version} already on npm — skipping npm publish step"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      # Auth via npm Trusted Publishing: the `id-token: write` permission
      # plus the trusted-publisher binding configured in the npm web UI
      # is exchanged for a one-shot publish token automatically. No
      # NPM_TOKEN secret is required.
      - name: Publish to npm
        if: steps.npm_check.outputs.already_published == 'false'
        run: npm publish --provenance --access public

      # Poll the dist.tarball CDN URL — not just metadata. The npm metadata
      # endpoint can become available before the CDN tarball does, so a
      # metadata-only check can let `mcp-publisher publish` race a 404.
      - name: Wait for npm registry propagation
        run: |
          version=$(node -p "require('./package.json').version")
          for i in {1..18}; do
            tarball=$(npm view "@lazyants/lexware-mcp-server@${version}" dist.tarball 2>/dev/null || true)
            if [ -n "$tarball" ] && curl -fsSIL "$tarball" >/dev/null 2>&1; then
              echo "npm tarball fetchable after ${i} retries: $tarball"
              exit 0
            fi
            sleep 5
          done
          echo "::error::npm tarball not fetchable after 90s — aborting"
          exit 1

      - name: Authenticate and publish to MCP Registry
        run: |
          mcp-publisher login github-oidc
          mcp-publisher publish
